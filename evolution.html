function bx(b){return PL+((b+.5)/NB)*(W()-PL-PR);}
function ty(p){return PT+(1-(p-pMin)/pSpan)*(H()-PT-PB);}
function prog(){var sh=document.documentElement.scrollHeight-innerHeight;return sh>0?scrollY/sh:0;}

// ═══ DRAW FUNCTIONS ═══

function drawGrid(){
  c.font='7px Helvetica Neue,sans-serif';
  for(var j=0;j<=6;j++){var p=pMin+50+(j/6)*(pSpan-100),y=ty(p);
    c.strokeStyle='rgba(255,255,255,0.015)';c.lineWidth=.5;
    c.beginPath();c.moveTo(PL,y);c.lineTo(W()-PR,y);c.stroke();
    c.fillStyle='#131313';c.fillText('$'+Math.round(p).toLocaleString(),3,y+3);}
}

function drawLine(endBar){
  if(endBar<2)return;
  // Use MB (close per bar) — same coordinates as bid/ask and OCI
  c.beginPath();c.strokeStyle='rgba(224,224,229,0.02)';c.lineWidth=8;
  for(var b=0;b<endBar&&b<NB;b++){b===0?c.moveTo(bx(b),ty(MB[b])):c.lineTo(bx(b),ty(MB[b]));}c.stroke();
  c.beginPath();c.strokeStyle='rgba(224,224,229,0.05)';c.lineWidth=3;
  for(var b=0;b<endBar&&b<NB;b++){b===0?c.moveTo(bx(b),ty(MB[b])):c.lineTo(bx(b),ty(MB[b]));}c.stroke();
  c.beginPath();c.strokeStyle='rgba(224,224,229,0.9)';c.lineWidth=1.2;c.lineJoin='round';
  for(var b=0;b<endBar&&b<NB;b++){b===0?c.moveTo(bx(b),ty(MB[b])):c.lineTo(bx(b),ty(MB[b]));}c.stroke();
  var tb=endBar-1;
  c.beginPath();c.arc(bx(tb),ty(MB[tb]),4,0,Math.PI*2);c.fillStyle='rgba(255,255,255,0.1)';c.fill();
  c.beginPath();c.arc(bx(tb),ty(MB[tb]),1.5,0,Math.PI*2);c.fillStyle='rgba(255,255,255,0.8)';c.fill();
}

function drawVolume(endBar,consumed){
  if(endBar<1)return;var con=consumed||0;
  var vH=(H()-PT-PB)*.15,baseY=H()-PB,bw=Math.max((W()-PL-PR)/NB*.7,1);
  for(var b=con;b<endBar&&b<NB;b++){
    var xc=bx(b),h=(VOL[b]/VMAX)*vH;
    var col=BULL[b]?'rgba(45,138,94,':'rgba(139,0,0,';
    c.fillStyle=col+'0.06)';c.fillRect(xc-bw/2-1,baseY-h-2,bw+2,h+4);
    c.fillStyle=col+'0.45)';c.fillRect(xc-bw/2,baseY-h,bw,h);}
  if(con>0&&con<NB){c.strokeStyle='rgba(68,136,204,0.2)';c.lineWidth=.5;
    c.beginPath();c.moveTo(bx(con),PT);c.lineTo(bx(con),baseY);c.stroke();}
}

function drawVP(consumed){
  if(consumed<1)return;
  var vpL=new Array(NVP).fill(0);
  for(var b=0;b<consumed&&b<NB;b++){
    var avg=MID[Math.min(Math.floor((b+.5)*N/NB),N-1)];
    var bn=Math.min(Math.floor((avg-vpLo)/vpSpan*NVP),NVP-1);vpL[bn]+=VOL[b];}
  var mx=Math.max.apply(null,vpL)||1,maxW=(W()-PL-PR)*.14,rX=W()-PR,bh=(H()-PT-PB)/NVP;
  for(var i=0;i<NVP;i++){if(vpL[i]<1)continue;var y=ty(VP_PRICES[i]),bw=(vpL[i]/mx)*maxW;
    c.fillStyle='rgba(68,136,204,0.04)';c.fillRect(rX-bw-2,y-bh/2-1,bw+4,bh+2);
    c.fillStyle='rgba(68,136,204,0.3)';c.fillRect(rX-bw,y-bh/2,bw,bh*.85);}
}

function drawBidAsk(endBar){
  if(endBar<2)return;
  var off=6; // visual offset since real spread is ~$0.10
  c.beginPath();c.strokeStyle='rgba(68,136,204,0.8)';c.lineWidth=1.3;
  for(var b=0;b<endBar&&b<NB;b++){var x=bx(b),y=ty(BBID[b])+off;b===0?c.moveTo(x,y):c.lineTo(x,y);}c.stroke();
  c.beginPath();c.strokeStyle='rgba(180,40,30,0.8)';c.lineWidth=1.3;
  for(var b=0;b<endBar&&b<NB;b++){var x=bx(b),y=ty(BASK[b])-off;b===0?c.moveTo(x,y):c.lineTo(x,y);}c.stroke();
  c.beginPath();for(var b=0;b<endBar&&b<NB;b++){b===0?c.moveTo(bx(b),ty(BBID[b])+off):c.lineTo(bx(b),ty(BBID[b])+off);}
  for(var b=endBar-1;b>=0;b--){c.lineTo(bx(b),ty(BASK[b])-off);}c.closePath();c.fillStyle='rgba(100,80,60,0.06)';c.fill();
}

function drawDelta(endBar,consumed){
  if(endBar<1)return;var con=consumed||0;
  var dH=(H()-PT-PB)*.15,baseY=H()-PB,bw=Math.max((W()-PL-PR)/NB*.7,1);
  for(var b=con;b<endBar&&b<NB;b++){
    var xc=bx(b),d=DELTA[b],h=Math.abs(d)/DMAX*dH;
    if(d>=0){c.fillStyle='rgba(68,136,204,0.45)';c.fillRect(xc-bw/2,baseY-h,bw,h);}
    else{c.fillStyle='rgba(180,40,30,0.45)';c.fillRect(xc-bw/2,baseY,bw,h);}
  }
  if(con>0&&con<NB){c.strokeStyle='rgba(68,136,204,0.2)';c.lineWidth=.5;
    c.beginPath();c.moveTo(bx(con),baseY-dH);c.lineTo(bx(con),baseY+dH);c.stroke();}
}

function drawDeltaProfile(consumed){
  if(consumed<1)return;
  var dpP=new Array(NDP).fill(0),dpN=new Array(NDP).fill(0);
  var lo=Math.min.apply(null,MID),sp=Math.max.apply(null,MID)-lo;
  for(var b=0;b<consumed&&b<NB;b++){
    var avg=MID[Math.min(Math.floor((b+.5)*N/NB),N-1)];
    var bn=Math.min(Math.floor((avg-lo)/sp*NDP),NDP-1);
    if(DELTA[b]>0)dpP[bn]+=DELTA[b];else dpN[bn]+=Math.abs(DELTA[b]);}
  var mx=Math.max(Math.max.apply(null,dpP),Math.max.apply(null,dpN))||1;
  var maxW=(W()-PL-PR)*.12,rX=W()-PR,bh=(H()-PT-PB)/NDP;
  for(var i=0;i<NDP;i++){var y=ty(DP_PRICES[i]);
    if(dpP[i]>0){var bw2=(dpP[i]/mx)*maxW;c.fillStyle='rgba(68,136,204,0.3)';c.fillRect(rX-bw2,y-bh/2,bw2,bh*.85);}
    if(dpN[i]>0){var bw2=(dpN[i]/mx)*maxW;c.fillStyle='rgba(180,40,30,0.25)';c.fillRect(rX-maxW,y-bh/2,bw2,bh*.85);}
  }
}

function drawOrderCloud(endBar){
  if(endBar<1)return;var bw=Math.max((W()-PL-PR)/NB*.8,2);
  for(var b=0;b<endBar&&b<NB;b++){if(!COMMIT[b])continue;var xc=bx(b);
    for(var j=0;j<COMMIT[b].length;j++){var o=COMMIT[b][j],price=o[0],qty=o[1],age=o[2],side=o[3];
      var y=ty(price),ap=Math.min(age/MAX_AGE,1),sz=Math.max(Math.log(1+qty/.01)*1.2,.6);
      var a=.04+ap*.3;
      c.fillStyle=side===0?'rgba(80,180,255,'+a.toFixed(3)+')':'rgba(220,70,35,'+a.toFixed(3)+')';
      c.beginPath();c.arc(xc+(Math.random()-.5)*bw,y,sz,0,Math.PI*2);c.fill();}}
}

function drawCVD(endBar){
  if(endBar<2)return;var cH=(H()-PT-PB)*.12,cB=H()-PB-5,cR=CVD_MAX-CVD_MIN||1;
  c.beginPath();c.moveTo(bx(0),cB);
  for(var b=0;b<endBar;b++){c.lineTo(bx(b),cB-(CVD[b]-CVD_MIN)/cR*cH);}
  c.lineTo(bx(endBar-1),cB);c.closePath();
  var g=c.createLinearGradient(0,cB-cH,0,cB);g.addColorStop(0,'rgba(45,138,94,0.1)');g.addColorStop(1,'rgba(45,138,94,0)');
  c.fillStyle=g;c.fill();
  c.beginPath();c.strokeStyle='rgba(45,138,94,0.5)';c.lineWidth=1;
  for(var b=0;b<endBar;b++){b===0?c.moveTo(bx(b),cB-(CVD[b]-CVD_MIN)/cR*cH):c.lineTo(bx(b),cB-(CVD[b]-CVD_MIN)/cR*cH);}c.stroke();
  var tb=endBar-1;c.beginPath();c.arc(bx(tb),cB-(CVD[tb]-CVD_MIN)/cR*cH,2,0,Math.PI*2);c.fillStyle='rgba(45,138,94,.6)';c.fill();
}

function drawDepth(endBar){
  if(endBar<1)return;var bw=Math.max((W()-PL-PR)/NB*.8,2),bh=Math.max(Math.abs(ty(70000)-ty(70001))*.8,.5);
  for(var b=0;b<endBar&&b<NB;b++){var xc=bx(b);
    if(DB2[b])for(var d=0;d<DB2[b].length;d++){c.fillStyle='rgba(40,100,180,'+Math.min(DB2[b][d][1]*.1,.15).toFixed(3)+')';c.fillRect(xc-bw/2,ty(DB2[b][d][0]),bw,bh);}
    if(DA2[b])for(var d=0;d<DA2[b].length;d++){c.fillStyle='rgba(120,20,10,'+Math.min(DA2[b][d][1]*.1,.15).toFixed(3)+')';c.fillRect(xc-bw/2,ty(DA2[b][d][0])-bh,bw,bh);}
  }
}

function drawOCI(endBar){
  if(endBar<2)return;
  // Use MB (close per bar) — same as L1 line
  function midB(b){return MB[b];}

  // Fill: MID to OCI ask (red zone above price)
  c.beginPath();
  for(var b=0;b<endBar&&b<NB;b++){b===0?c.moveTo(bx(b),ty(midB(b))):c.lineTo(bx(b),ty(midB(b)));}
  for(var b=endBar-1;b>=0;b--){c.lineTo(bx(b),ty(OCI_A[b]));}
  c.closePath();c.fillStyle='rgba(139,0,0,0.1)';c.fill();

  // Fill: OCI bid to MID (blue zone below price)
  c.beginPath();
  for(var b=0;b<endBar&&b<NB;b++){b===0?c.moveTo(bx(b),ty(OCI_B[b])):c.lineTo(bx(b),ty(OCI_B[b]));}
  for(var b=endBar-1;b>=0;b--){c.lineTo(bx(b),ty(midB(b)));}
  c.closePath();c.fillStyle='rgba(30,60,120,0.1)';c.fill();

  // OCI bid line (blue) + glow
  c.beginPath();c.strokeStyle='rgba(70,140,230,0.05)';c.lineWidth=8;
  for(var b=0;b<endBar&&b<NB;b++){b===0?c.moveTo(bx(b),ty(OCI_B[b])):c.lineTo(bx(b),ty(OCI_B[b]));}c.stroke();
  c.beginPath();c.strokeStyle='rgba(70,140,230,0.6)';c.lineWidth=1;
  for(var b=0;b<endBar&&b<NB;b++){b===0?c.moveTo(bx(b),ty(OCI_B[b])):c.lineTo(bx(b),ty(OCI_B[b]));}c.stroke();

  // OCI ask line (red) + glow
  c.beginPath();c.strokeStyle='rgba(200,50,30,0.05)';c.lineWidth=8;
  for(var b=0;b<endBar&&b<NB;b++){b===0?c.moveTo(bx(b),ty(OCI_A[b])):c.lineTo(bx(b),ty(OCI_A[b]));}c.stroke();
  c.beginPath();c.strokeStyle='rgba(200,50,30,0.6)';c.lineWidth=1;
  for(var b=0;b<endBar&&b<NB;b++){b===0?c.moveTo(bx(b),ty(OCI_A[b])):c.lineTo(bx(b),ty(OCI_A[b]));}c.stroke();

  // MID price (white, the actual price)
  c.beginPath();c.strokeStyle='rgba(230,230,235,0.85)';c.lineWidth=1.2;
  for(var b=0;b<endBar&&b<NB;b++){b===0?c.moveTo(bx(b),ty(midB(b))):c.lineTo(bx(b),ty(midB(b)));}c.stroke();
}

function drawCommitment(endBar){
  if(endBar<1)return;var bw=Math.max((W()-PL-PR)/NB*.8,2);
  for(var b=0;b<endBar&&b<NB;b++){if(!COMMIT[b])continue;var xc=bx(b);
    for(var j=0;j<COMMIT[b].length;j++){var o=COMMIT[b][j],price=o[0],qty=o[1],age=o[2],side=o[3];
      var y=ty(price),ap=Math.min(age/MAX_AGE,1),sz=Math.max(Math.log(1+qty/.01)*1.4,.8);
      var a=.05+ap*.35;
      c.fillStyle=side===0?'rgba(80,180,255,'+a.toFixed(3)+')':'rgba(220,70,35,'+a.toFixed(3)+')';
      c.beginPath();c.arc(xc+(Math.random()-.5)*bw,y,sz,0,Math.PI*2);c.fill();}}
}

// Arcs: cached offscreen
var _arcOC=null;
function ensureArcs(){
  if(_arcOC)return;var w=W(),h=H();
  _arcOC=document.createElement('canvas');_arcOC.width=w*dpr;_arcOC.height=h*dpr;
  var g=_arcOC.getContext('2d');g.setTransform(dpr,0,0,dpr,0,0);

  // Arcs only — baseline at bottom, arcs go upward
  var baseline=h-PB;

  // ── Arcs: cancelled FIRST (behind), then filled ON TOP ──
  function drawArc(j){
    var x1=PL+((ARC_B[j]+.5)/NB)*(w-PL-PR);
    var x2=PL+((ARC_D[j]+.5)/NB)*(w-PL-PR);
    var f=ARC_F[j],qty=ARC_Q[j],life=ARC_L[j];
    var cx=(x1+x2)/2,wd=x2-x1;
    var ht=wd*1.2;

    // Alpha and linewidth from gen_arcs.py
    var a,lw;
    if(f){
      a=Math.min(0.12+qty*0.3, 0.6);
      lw=0.3+Math.min(qty,0.5)*2+Math.min(life/100,1)*0.5;
      g.strokeStyle='rgba(68,136,204,'+a.toFixed(3)+')';
    }else{
      a=Math.min(0.08*0.8+qty*0.2, 0.4);
      lw=0.3+Math.min(qty,0.5)*1.5+Math.min(life/100,1)*0.3;
      g.strokeStyle='rgba(139,0,0,'+a.toFixed(3)+')';
    }
    g.lineWidth=lw;

    // Draw arc (20 steps)
    g.beginPath();
    for(var s=0;s<=20;s++){
      var t=s/20*Math.PI;
      var px=cx+(wd/2)*Math.cos(t);
      var py=baseline-(ht/2)*Math.sin(t);
      s===0?g.moveTo(px,py):g.lineTo(px,py);
    }
    g.stroke();
  }

  // Cancelled first (behind)
  for(var j=0;j<N_ARC;j++){if(!ARC_F[j]) drawArc(j);}
  // Filled on top
  for(var j=0;j<N_ARC;j++){if(ARC_F[j]) drawArc(j);}
}
function drawArcs(alpha){if(alpha<=0)return;ensureArcs();c.globalAlpha=alpha;c.drawImage(_arcOC,0,0,W(),H());c.globalAlpha=1;}

// ═══ RENDER ═══

function render(){
  c.clearRect(0,0,W(),H());
  var p=prog();
  barEl.style.width=(p*100)+'%';

  // Scroll mapping
  // ACT 1: L1 (0→30%), fade (30→33%)
  // ACT 2: L2 (33→60%), fade (60→63%)
  // ACT 3: L3 (63→85%)
  // 3D: (85→100%)

  var a1_close=Math.min(p/.10,1);
  var a1_vol=Math.max(Math.min((p-.10)/.10,1),0);
  var a1_vp=Math.max(Math.min((p-.20)/.10,1),0);
  var l1fade=Math.max(Math.min((p-.30)/.03,1),0); // 0→1 during fade

  var a2_ba=Math.max(Math.min((p-.33)/.04,1),0);
  var a2_delta=Math.max(Math.min((p-.37)/.04,1),0);
  var a2_dp=Math.max(Math.min((p-.41)/.04,1),0);
  var a2_cvd=Math.max(Math.min((p-.45)/.05,1),0);
  var a2_depth=Math.max(Math.min((p-.50)/.10,1),0);
  var l2fade=Math.max(Math.min((p-.60)/.03,1),0);

  var a3_oci=Math.max(Math.min((p-.63)/.05,1),0);
  var a3_cloud=Math.max(Math.min((p-.68)/.05,1),0);
  var a3_commit=Math.max(Math.min((p-.73)/.05,1),0);
  var a3_arcs=Math.max(Math.min((p-.78)/.07,1),0);

  var p3d=Math.max(Math.min((p-.85)/.15,1),0);

  drawGrid();

  // ═══ ACT 1: L1 ═══
  if(l1fade<1){
    var fade=1-l1fade;
    c.globalAlpha=fade;
    drawLine(Math.max(Math.floor(a1_close*NB),2));
    if(a1_vol>0) drawVolume(Math.max(Math.floor(a1_vol*NB),1), a1_vp>0?Math.floor(a1_vp*NB):0);
    if(a1_vp>0) drawVP(Math.floor(a1_vp*NB));
    c.globalAlpha=1;
  }

  // ═══ ACT 2: L2 ═══
  if(l1fade>0 && l2fade<1){
    var fade=l1fade*(1-l2fade);
    c.globalAlpha=fade;
    if(a2_depth>0) drawDepth(Math.max(Math.floor(a2_depth*NB),1));
    if(a2_ba>0) drawBidAsk(Math.max(Math.floor(a2_ba*NB),2));
    if(a2_delta>0) drawDelta(Math.max(Math.floor(a2_delta*NB),1), a2_dp>0?Math.floor(a2_dp*NB):0);
    if(a2_dp>0) drawDeltaProfile(Math.floor(a2_dp*NB));
    if(a2_cvd>0) drawCVD(Math.max(Math.floor(a2_cvd*NB),2));
    c.globalAlpha=1;
  }

  // ═══ ACT 3: L3 ═══
  if(l2fade>0 && p3d<1){
    var fade=l2fade*(1-p3d);
    c.globalAlpha=fade;
    if(a3_oci>0) drawOCI(Math.max(Math.floor(a3_oci*NB),2));
    if(a3_cloud>0) drawOrderCloud(Math.max(Math.floor(a3_cloud*NB),1));
    if(a3_commit>0) drawCommitment(Math.max(Math.floor(a3_commit*NB),1));
    if(a3_arcs>0) drawArcs(a3_arcs);
    c.globalAlpha=1;
  }

  // ═══ 3D TRANSITION ═══
  if(p3d>0){
    cv.style.opacity=1-p3d;
    document.getElementById('three').style.opacity=p3d;
    update3D(p3d);
  }else{
    cv.style.opacity=1;
    document.getElementById('three').style.opacity=0;
  }

  // Label
  // Act transitions
  var curAct=p3d>.01?4:l2fade>.01?3:l1fade>.01?2:a1_close>.01?1:0;
  if(curAct!==lastAct&&curAct>0){
    lastAct=curAct;
    if(curAct===1) showAct('L1','Price · Volume · Profile');
    if(curAct===2) showAct('L2','Depth · Delta · Flow');
    if(curAct===3) showAct('L3','Individual Orders');
    if(curAct===4) showAct('3D','Market Depth');
  }

  // Parasec labels
  if(p3d>.01) setPhase('XII','3D Order Book');
  else if(a3_arcs>.01) setPhase('XI','Order Arcs');
  else if(a3_commit>.01) setPhase('X','Commitment');
  else if(a3_cloud>.01) setPhase('IX','Order Cloud');
  else if(a3_oci>.01) setPhase('VIII','OCI River Flow');
  else if(l2fade>.3){phaseEl.style.opacity=0;}
  else if(a2_depth>.01) setPhase('VII','Order Book Depth');
  else if(a2_cvd>.01) setPhase('VI','CVD');
  else if(a2_dp>.01) setPhase('V','Delta Profile');
  else if(a2_delta>.01) setPhase('IV','Delta');
  else if(a2_ba>.01) setPhase('III','Bid / Ask');
  else if(l1fade>.3){phaseEl.style.opacity=0;}
  else if(a1_vp>.01) setPhase('II','Volume Profile');
  else if(a1_vol>.01) setPhase('I','Volume');
  else if(a1_close>.01) setPhase('','Close Price');
  else phaseEl.style.opacity=0;

  // Hide scroll hint after first scroll
  if(p>.02) hintEl.style.opacity=0;

  requestAnimationFrame(render);
}

// ═══ THREE.JS 3D — 3 PLANS EN ÉVENTAIL ═══
var tDiv=document.getElementById('three');
var sc=new THREE.Scene();
sc.background=new THREE.Color(0x040406);
sc.fog=new THREE.FogExp2(0x040406,0.0008);

var cam=new THREE.PerspectiveCamera(45,innerWidth/innerHeight,1,3000);
cam.position.set(0,50,600);
var ren=new THREE.WebGLRenderer({antialias:true,alpha:true});
ren.setSize(innerWidth,innerHeight);ren.setPixelRatio(Math.min(dpr,2));
ren.shadowMap.enabled=false;
tDiv.appendChild(ren.domElement);
addEventListener('resize',function(){cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();ren.setSize(innerWidth,innerHeight);});

// Create 3 offscreen canvases and render each layer
function makeOC(w,h){var oc=document.createElement('canvas');oc.width=w;oc.height=h;return oc;}

var tw=1920,th=1080;
var oc1=makeOC(tw,th),oc2=makeOC(tw,th),oc3=makeOC(tw,th);

function renderToOC(oc,drawFn){
  var oldC=c,oldW=W,oldH=H;
  var g=oc.getContext('2d');
  c=g;W=function(){return tw;};H=function(){return th;};
  g.clearRect(0,0,tw,th);
  drawFn(g);
  c=oldC;W=oldW;H=oldH;
}

renderToOC(oc1,function(){drawLine(NB);drawVolume(NB,0);drawVP(NB);});
renderToOC(oc2,function(){drawBidAsk(NB);drawDelta(NB,0);drawDeltaProfile(NB);drawCVD(NB);drawDepth(NB);});
renderToOC(oc3,function(){drawOCI(NB);drawOrderCloud(NB);drawCommitment(NB);ensureArcs();if(_arcOC)c.drawImage(_arcOC,0,0,tw,th);});

var tex1=new THREE.CanvasTexture(oc1);tex1.minFilter=THREE.LinearFilter;
var tex2=new THREE.CanvasTexture(oc2);tex2.minFilter=THREE.LinearFilter;
var tex3=new THREE.CanvasTexture(oc3);tex3.minFilter=THREE.LinearFilter;

// Planes — larger, cinematic aspect
var pw=500,ph=pw*th/tw;
var planeGeo=new THREE.PlaneGeometry(pw,ph);

// L1 (front) — full opacity, slight glow
var mat1=new THREE.MeshBasicMaterial({map:tex1,transparent:true,opacity:0.92,side:THREE.DoubleSide});
var plane1=new THREE.Mesh(planeGeo,mat1);
plane1.position.set(0,0,80);
sc.add(plane1);

// L2 (middle)
var mat2=new THREE.MeshBasicMaterial({map:tex2,transparent:true,opacity:0.85,side:THREE.DoubleSide});
var plane2=new THREE.Mesh(planeGeo.clone(),mat2);
plane2.position.set(20,0,-80);
plane2.rotation.y=-0.15;
sc.add(plane2);

// L3 (back)
var mat3=new THREE.MeshBasicMaterial({map:tex3,transparent:true,opacity:0.78,side:THREE.DoubleSide});
var plane3=new THREE.Mesh(planeGeo.clone(),mat3);
plane3.position.set(40,0,-240);
plane3.rotation.y=-0.30;
sc.add(plane3);

// Edge glow lines connecting the planes
var edgeMat=new THREE.LineBasicMaterial({color:0x8B0000,transparent:true,opacity:0.08});
function addEdge(x1,y1,z1,x2,y2,z2){
  var g=new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(x1,y1,z1),new THREE.Vector3(x2,y2,z2)]);
  sc.add(new THREE.Line(g,edgeMat));
}
// Connect corners L1→L2→L3
addEdge(-pw/2,-ph/2,80,-pw/2+20,-ph/2,-80);
addEdge(pw/2,-ph/2,80,pw/2+20,-ph/2,-80);
addEdge(-pw/2+20,-ph/2,-80,-pw/2+40,-ph/2,-240);
addEdge(pw/2+20,-ph/2,-80,pw/2+40,-ph/2,-240);

// Floating particles between planes (depth particles)
var dpCount=500;
var dpGeo=new THREE.BufferGeometry();
var dpPos=new Float32Array(dpCount*3),dpCol=new Float32Array(dpCount*3);
for(var i=0;i<dpCount;i++){
  dpPos[i*3]=(Math.random()-0.5)*pw*1.2;
  dpPos[i*3+1]=(Math.random()-0.5)*ph;
  dpPos[i*3+2]=80-Math.random()*320;
  var depth=(dpPos[i*3+2]+240)/320; // 0=back, 1=front
  if(depth>0.6){dpCol[i*3]=0.9;dpCol[i*3+1]=0.9;dpCol[i*3+2]=0.92;} // L1 white
  else if(depth>0.3){dpCol[i*3]=0.27;dpCol[i*3+1]=0.53;dpCol[i*3+2]=0.8;} // L2 blue
  else{dpCol[i*3]=0.55;dpCol[i*3+1]=0.12;dpCol[i*3+2]=0.08;} // L3 red
}
dpGeo.setAttribute('position',new THREE.Float32BufferAttribute(dpPos,3));
dpGeo.setAttribute('color',new THREE.Float32BufferAttribute(dpCol,3));
var dpMat=new THREE.PointsMaterial({size:1.2,vertexColors:true,transparent:true,opacity:0.15,sizeAttenuation:true});
var dpPoints=new THREE.Points(dpGeo,dpMat);
sc.add(dpPoints);

// Subtle ground plane
var groundGeo=new THREE.PlaneGeometry(800,500);
var groundMat=new THREE.MeshBasicMaterial({color:0x060608,transparent:true,opacity:0.5,side:THREE.DoubleSide});
var ground=new THREE.Mesh(groundGeo,groundMat);
ground.rotation.x=-Math.PI/2;ground.position.y=-ph/2-10;
sc.add(ground);

// Grid on ground
var gridMat2=new THREE.LineBasicMaterial({color:0x111118,transparent:true,opacity:0.1});
for(var i=-5;i<=5;i++){
  var gg=new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(i*40,-ph/2-10,-300),new THREE.Vector3(i*40,-ph/2-10,150)]);
  sc.add(new THREE.Line(gg,gridMat2));
  var gg2=new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(-250,-ph/2-10,i*50),new THREE.Vector3(250,-ph/2-10,i*50)]);
  sc.add(new THREE.Line(gg2,gridMat2));
}

// ═══ 3D GEOMETRY — Lines + Particles (no TubeGeometry) ═══
var midMin3=Math.min.apply(null,MB),midSpan3=Math.max.apply(null,MB)-midMin3;
function p3x(b){return(b/NB-0.5)*pw;}
function p3y(pr){return((pr-midMin3)/midSpan3-0.5)*ph;}

// Helper: make a 3D line from bar data
function make3DLine(data,zPos,xOff,color,opacity,width){
  var pts=[];
  for(var b=0;b<NB;b+=2){pts.push(new THREE.Vector3(p3x(b)+xOff,p3y(data[b]),zPos));}
  var geo=new THREE.BufferGeometry().setFromPoints(pts);
  var mat=new THREE.LineBasicMaterial({color:color,transparent:true,opacity:opacity,linewidth:width||1});
  return new THREE.Line(geo,mat);
}

// L1: Close price (white, Z=82)
sc.add(make3DLine(MB,82,0,0xe0e0e5,0.85));
// L1: Volume bars
for(var b=0;b<NB;b+=3){
  var h3=(VOL[b]/VMAX)*ph*0.2;
  var g3=new THREE.BoxGeometry(pw/NB*2,h3,3);
  var m3=new THREE.Mesh(g3,new THREE.MeshBasicMaterial({color:BULL[b]?0x2d8a5e:0x8B0000,transparent:true,opacity:0.2}));
  m3.position.set(p3x(b),-ph/2+h3/2,85);sc.add(m3);
}

// L2: Bid (blue) + Ask (red) + spread fill (Z=-78)
sc.add(make3DLine(BBID,-78,20,0x4488cc,0.7));
sc.add(make3DLine(BASK,-78,20,0x8B0000,0.7));
// Spread mesh
var spV=[];
for(var b=0;b<NB;b+=2){spV.push(p3x(b)+20,p3y(BBID[b]),-78);spV.push(p3x(b)+20,p3y(BASK[b]),-78);}
var spGeo=new THREE.BufferGeometry();spGeo.setAttribute('position',new THREE.Float32BufferAttribute(spV,3));
var spIdx=[];for(var i=0;i<NB/2-1;i++){var a=i*2;spIdx.push(a,a+1,a+2,a+1,a+3,a+2);}
spGeo.setIndex(spIdx);
sc.add(new THREE.Mesh(spGeo,new THREE.MeshBasicMaterial({color:0x555040,transparent:true,opacity:0.05,side:THREE.DoubleSide})));

// L3: OCI bid (cyan) + ask (orange) + mid (white) (Z=-238)
sc.add(make3DLine(OCI_B,-238,40,0x50b0ff,0.65));
sc.add(make3DLine(OCI_A,-238,40,0xcc4422,0.65));
sc.add(make3DLine(MB,-238,40,0xe0e0e5,0.35));
// OCI fill
var ociV=[];
for(var b=0;b<NB;b+=2){ociV.push(p3x(b)+40,p3y(OCI_B[b]),-238);ociV.push(p3x(b)+40,p3y(OCI_A[b]),-238);}
var ociGeo=new THREE.BufferGeometry();ociGeo.setAttribute('position',new THREE.Float32BufferAttribute(ociV,3));
var ociIdx=[];for(var i=0;i<NB/2-1;i++){var a=i*2;ociIdx.push(a,a+1,a+2,a+1,a+3,a+2);}
ociGeo.setIndex(ociIdx);
sc.add(new THREE.Mesh(ociGeo,new THREE.MeshBasicMaterial({color:0x442233,transparent:true,opacity:0.06,side:THREE.DoubleSide})));

// L3 order particles
var l3pCount=800;
var l3pGeo=new THREE.BufferGeometry();
var l3pPos=new Float32Array(l3pCount*3),l3pCol=new Float32Array(l3pCount*3);
for(var i=0;i<l3pCount;i++){
  var bi2=Math.floor(Math.random()*NB);
  var isBid2=Math.random()>0.5;
  l3pPos[i*3]=p3x(bi2)+40+(Math.random()-0.5)*8;
  l3pPos[i*3+1]=p3y(MB[bi2])+(isBid2?-1:1)*(Math.random()*ph*0.25);
  l3pPos[i*3+2]=-238+(Math.random()-0.5)*30;
  if(isBid2){l3pCol[i*3]=0.3;l3pCol[i*3+1]=0.7;l3pCol[i*3+2]=1;}
  else{l3pCol[i*3]=0.85;l3pCol[i*3+1]=0.2;l3pCol[i*3+2]=0.1;}
}
l3pGeo.setAttribute('position',new THREE.Float32BufferAttribute(l3pPos,3));
l3pGeo.setAttribute('color',new THREE.Float32BufferAttribute(l3pCol,3));
var l3pPoints=new THREE.Points(l3pGeo,new THREE.PointsMaterial({size:1.8,vertexColors:true,transparent:true,opacity:0.25,sizeAttenuation:true}));
sc.add(l3pPoints);

// Labels on each plane
function addLabel(text,x,y,z,color){
  var cv2=document.createElement('canvas');cv2.width=512;cv2.height=64;
  var g2=cv2.getContext('2d');
  g2.fillStyle='transparent';g2.fillRect(0,0,512,64);
  g2.font='bold 32px Helvetica Neue, sans-serif';
  g2.fillStyle=color;g2.fillText(text,10,42);
  var t=new THREE.CanvasTexture(cv2);t.minFilter=THREE.LinearFilter;
  var m=new THREE.MeshBasicMaterial({map:t,transparent:true,side:THREE.DoubleSide});
  var p=new THREE.Mesh(new THREE.PlaneGeometry(120,15),m);
  p.position.set(x,y,z);return p;
}
sc.add(addLabel('L1 — PRICE',-pw/2+30,ph/2+15,82,'#ffffff'));
sc.add(addLabel('L2 — DEPTH',-pw/2+50,ph/2+15,-78,'#4488cc'));
sc.add(addLabel('L3 — ORDERS',-pw/2+70,ph/2+15,-238,'#8B0000'));

// Ambient light
var light=new THREE.AmbientLight(0xffffff,1);sc.add(light);

// Mouse navigation + auto-orbit when idle
var t3=0, mouseDown=false, lastMX=0, lastMY=0;
var camAngleX=0.2, camAngleY=0.2, camDist=550, camTarget={x:20,y:0,z:-80};
var lastInteract=0, idleDelay=3000; // 3s before auto-orbit resumes

tDiv.style.pointerEvents='auto';
tDiv.addEventListener('mousedown',function(e){mouseDown=true;lastMX=e.clientX;lastMY=e.clientY;lastInteract=Date.now();});
tDiv.addEventListener('mouseup',function(){mouseDown=false;});
tDiv.addEventListener('mousemove',function(e){
  if(!mouseDown)return;lastInteract=Date.now();
  camAngleX+=(e.clientX-lastMX)*0.005;
  camAngleY+=(e.clientY-lastMY)*0.005;
  camAngleY=Math.max(-1,Math.min(1,camAngleY));
  lastMX=e.clientX;lastMY=e.clientY;
});
tDiv.addEventListener('wheel',function(e){
  lastInteract=Date.now();
  camDist+=e.deltaY*0.5;
  camDist=Math.max(150,Math.min(800,camDist));
  e.preventDefault();
},{passive:false});

function update3D(p){
  t3+=.004;
  var idle=Date.now()-lastInteract>idleDelay;

  // Auto-orbit when idle
  if(idle){camAngleX+=0.002;}

  cam.position.x=Math.sin(camAngleX)*camDist*Math.cos(camAngleY);
  cam.position.z=Math.cos(camAngleX)*camDist*Math.cos(camAngleY);
  cam.position.y=camDist*Math.sin(camAngleY);
  cam.lookAt(camTarget.x,camTarget.y,camTarget.z);

  // Animate depth particles
  var dpos=dpGeo.attributes.position.array;
  for(var i=0;i<dpCount;i++){
    dpos[i*3+1]+=Math.sin(t3*2+i*.1)*.05;
    dpos[i*3+2]+=Math.sin(t3+i*.07)*.03;
  }
  dpGeo.attributes.position.needsUpdate=true;

  // Animate L3 order particles
  var lpos=l3pGeo.attributes.position.array;
  for(var i=0;i<l3pCount;i++){
    lpos[i*3+1]+=Math.sin(t3*1.5+i*.08)*.06;
    lpos[i*3+2]+=Math.cos(t3+i*.05)*.04;
  }
  l3pGeo.attributes.position.needsUpdate=true;

  ren.render(sc,cam);
}

render();
</script></body></html>
