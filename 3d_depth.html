const NT = 200, NP = 30;
const DMAX = 20.558;
const HEIGHT_SCALE = 15;
const MID_LEVEL = 15;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x060608);
scene.fog = new THREE.FogExp2(0x060608, 0.006);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 500);
camera.position.set(50, 35, 50);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const ctrl = new OrbitControls(camera, renderer.domElement);
ctrl.enableDamping = true;
ctrl.dampingFactor = 0.05;
ctrl.autoRotate = true;
ctrl.autoRotateSpeed = 0.25;
ctrl.target.set(0, 4, 0);
ctrl.maxDistance = 150;
ctrl.minDistance = 15;

// Lights
scene.add(new THREE.AmbientLight(0x222233, 0.6));
const dL = new THREE.DirectionalLight(0xffeedd, 0.7);
dL.position.set(30, 50, 20);
scene.add(dL);

const rL = new THREE.PointLight(0x8B0000, 1.5, 100);
rL.position.set(-20, 20, 0);
scene.add(rL);

const bL = new THREE.PointLight(0x3366aa, 1.0, 100);
bL.position.set(20, 20, 0);
scene.add(bL);

// Grid floor
const grid = new THREE.GridHelper(120, 40, 0x0e0e1a, 0x08080f);
grid.position.y = -0.5;
scene.add(grid);

// Surface
const surfW = 80, surfD = 50;
const geo = new THREE.PlaneGeometry(surfW, surfD, NT - 1, NP - 1);
geo.rotateX(-Math.PI / 2);

const pos = geo.attributes.position;
const colors = new Float32Array(pos.count * 3);

for (let i = 0; i < pos.count; i++) {
  const ix = i % NT;
  const iz = Math.floor(i / NT);
  const val = GRID[ix * NP + iz] || 0;
  const norm = Math.min(1, Math.abs(val) / DMAX);
  const norm2 = val / DMAX; // signed for velocity

  // Height
  const h = norm * HEIGHT_SCALE;
  pos.setY(i, h);

  // Color
  let r, g, b;
  
      // Parasec: black -> dark red -> orange -> warm white
      if (norm < 0.25) {
        let t = norm * 4;
        r = t * 0.3; g = 0; b = t * 0.05;
      } else if (norm < 0.5) {
        let t = (norm - 0.25) * 4;
        r = 0.3 + t * 0.55; g = t * 0.05; b = 0.05 * (1 - t);
      } else if (norm < 0.75) {
        let t = (norm - 0.5) * 4;
        r = 0.85 + t * 0.15; g = 0.05 + t * 0.35; b = t * 0.1;
      } else {
        let t = (norm - 0.75) * 4;
        r = 1; g = 0.4 + t * 0.5; b = 0.1 + t * 0.7;
      }


  // Mid-price line highlight
  if (iz === MID_LEVEL || iz === MID_LEVEL - 1) {
    r = Math.min(1, r + 0.15);
  }

  colors[i * 3] = r;
  colors[i * 3 + 1] = g;
  colors[i * 3 + 2] = b;
}

geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
geo.computeVertexNormals();

const mat = new THREE.MeshPhongMaterial({
  vertexColors: true, shininess: 30,
  transparent: true, opacity: 0.9, side: THREE.DoubleSide,
});
scene.add(new THREE.Mesh(geo, mat));

// Wireframe
const wMat = new THREE.MeshBasicMaterial({
  color: 0x8B0000, wireframe: true, transparent: true, opacity: 0.04,
});
scene.add(new THREE.Mesh(geo.clone(), wMat));

// Mid-price line
const midZ = (MID_LEVEL / NP - 0.5) * surfD;
const lineGeo = new THREE.BufferGeometry().setFromPoints([
  new THREE.Vector3(-surfW/2, 0.1, midZ),
  new THREE.Vector3(surfW/2, 0.1, midZ),
]);
const lineMat = new THREE.LineBasicMaterial({ color: 0x8B0000, transparent: true, opacity: 0.4 });
scene.add(new THREE.Line(lineGeo, lineMat));

// Labels
function label(text, x, y, z, c = 0x333344) {
  const cv = document.createElement('canvas');
  cv.width = 256; cv.height = 64;
  const cx = cv.getContext('2d');
  cx.fillStyle = '#' + c.toString(16).padStart(6, '0');
  cx.font = '20px Helvetica Neue, sans-serif';
  cx.textAlign = 'center';
  cx.fillText(text, 128, 40);
  const t = new THREE.CanvasTexture(cv);
  const m = new THREE.SpriteMaterial({ map: t, transparent: true, opacity: 0.4 });
  const s = new THREE.Sprite(m);
  s.position.set(x, y, z); s.scale.set(8, 2, 1);
  scene.add(s);
}

label('TIME \u2192', 0, -1, surfD/2 + 4);
label('MID', surfW/2 + 4, -1, midZ, 0x8B0000);
label('BIDS \u2190', -surfW/2 - 4, -1, -surfD/2 + 3, 0x2d8a5e);
label('ASKS \u2192', -surfW/2 - 4, -1, surfD/2 - 3, 0x8B0000);

// Animate
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  rL.position.x = Math.sin(t * 0.25) * 30;
  rL.position.z = Math.cos(t * 0.25) * 20;
  bL.position.x = Math.cos(t * 0.2) * 25;
  bL.position.z = Math.sin(t * 0.2) * 25;
  ctrl.update();
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
