const NT = 800, NP = 50, MID_LVL = 25;
const MAXVAL = 17.806;
const YLABELS = ["-1.77%","-1.69%","-1.62%","-1.55%","-1.48%","-1.41%","-1.34%","-1.27%","-1.20%","-1.13%","-1.06%","-0.98%","-0.91%","-0.84%","-0.77%","-0.70%","-0.63%","-0.56%","-0.49%","-0.42%","-0.35%","-0.28%","-0.21%","-0.14%","-0.07%","+0.07%","+0.14%","+0.21%","+0.28%","+0.35%","+0.42%","+0.49%","+0.56%","+0.63%","+0.70%","+0.77%","+0.84%","+0.91%","+0.98%","+1.04%","+1.11%","+1.18%","+1.25%","+1.32%","+1.39%","+1.46%","+1.53%","+1.60%","+1.67%","+1.73%"];

const cv = document.getElementById('cv');
const dpr = window.devicePixelRatio || 1;

function render() {
  const w = window.innerWidth;
  const h = window.innerHeight;
  cv.width = w * dpr; cv.height = h * dpr;
  cv.style.width = w + 'px'; cv.style.height = h + 'px';
  const ctx = cv.getContext('2d');
  ctx.scale(dpr, dpr);

  const PAD_L = 62, PAD_R = 55, PAD_T = 28, PAD_B = 32;
  const pw = w - PAD_L - PAD_R, ph = h - PAD_T - PAD_B;

  ctx.fillStyle = '#060608';
  ctx.fillRect(0, 0, w, h);

  
  function colorRGB(val) {
    // Parasec: black -> dark red -> orange -> warm white
    const n = Math.min(1, Math.max(0, val / MAXVAL));
    if (n < 0.25) {
      const t = n * 4;
      return [Math.floor(t * 77), 0, Math.floor(t * 13)];
    } else if (n < 0.5) {
      const t = (n - 0.25) * 4;
      return [Math.floor(77 + t * 140), Math.floor(t * 13), Math.floor(13 * (1 - t))];
    } else if (n < 0.75) {
      const t = (n - 0.5) * 4;
      return [Math.floor(217 + t * 38), Math.floor(13 + t * 90), Math.floor(t * 25)];
    } else {
      const t = (n - 0.75) * 4;
      return [255, Math.floor(103 + t * 130), Math.floor(25 + t * 180)];
    }
  }


  const cellW = pw / NT;
  const cellH = ph / NP;

  // Heatmap
  for (let t = 0; t < NT; t++) {
    for (let p = 0; p < NP; p++) {
      const val = DATA[t * NP + p];
      const rgb = colorRGB(val);
      if (rgb[0] < 4 && rgb[1] < 4 && rgb[2] < 6) continue;
      ctx.fillStyle = 'rgb(' + rgb[0] + ',' + rgb[1] + ',' + rgb[2] + ')';
      ctx.fillRect(PAD_L + t * cellW, PAD_T + (NP - 1 - p) * cellH, cellW + 0.5, cellH + 0.5);
    }
  }

  // Subtle horizontal grid
  ctx.strokeStyle = 'rgba(255,255,255,0.025)';
  ctx.lineWidth = 0.5;
  for (let i = 0; i < NP; i += 5) {
    const y = PAD_T + (NP - 1 - i) * cellH;
    ctx.beginPath(); ctx.moveTo(PAD_L, y); ctx.lineTo(PAD_L + pw, y); ctx.stroke();
  }

  // Mid price line through heatmap
  const midBase = PAD_T + (NP - 1 - MID_LVL) * cellH + cellH / 2;
  const midMin = Math.min(...MID);
  const midMax = Math.max(...MID);
  const midSpan = midMax - midMin || 1;

  ctx.strokeStyle = 'rgba(255,255,255,0.45)';
  ctx.lineWidth = 0.8;
  ctx.beginPath();
  for (let i = 0; i < NT; i++) {
    const x = PAD_L + (i / NT) * pw;
    const offset = ((MID[i] - (midMin + midMax) / 2) / midSpan) * cellH * NP * 0.25;
    const y = midBase - offset;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.stroke();

  // Mid price label right side
  const lastOffset = ((MID[NT-1] - (midMin + midMax) / 2) / midSpan) * cellH * NP * 0.25;
  const lastMidY = midBase - lastOffset;
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.font = '9px Helvetica Neue, sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('$' + Math.round(MID[NT-1]), PAD_L + pw + 6, lastMidY + 3);

  // Y labels
  ctx.fillStyle = '#444';
  ctx.font = '9px Helvetica Neue, sans-serif';
  ctx.textAlign = 'right';
  for (let i = 0; i < NP; i += 3) {
    const y = PAD_T + (NP - 1 - i) * cellH + cellH / 2 + 3;
    ctx.fillText(YLABELS[i], PAD_L - 6, y);
  }

  // Time labels
  ctx.textAlign = 'center';
  ctx.fillStyle = '#444';
  ctx.font = '9px Helvetica Neue, sans-serif';
  for (const [idx, lbl] of TLABELS) {
    const x = PAD_L + (idx / NT) * pw;
    ctx.fillText(lbl, x, h - 8);
    ctx.strokeStyle = 'rgba(255,255,255,0.02)';
    ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.moveTo(x, PAD_T); ctx.lineTo(x, PAD_T + ph); ctx.stroke();
  }

  // Title — cinema style
  ctx.fillStyle = '#8B0000';
  ctx.font = '11px Helvetica Neue, sans-serif';
  ctx.letterSpacing = '3px';
  ctx.textAlign = 'left';
  ctx.fillText('Depth'.toUpperCase(), PAD_L, 14);

  // Progress bar bottom
  ctx.fillStyle = '#111';
  ctx.fillRect(PAD_L, h - 3, pw, 1);
  ctx.fillStyle = '#8B0000';
  ctx.fillRect(PAD_L, h - 3, pw * 0.7, 1);
}

render();
window.addEventListener('resize', render);
